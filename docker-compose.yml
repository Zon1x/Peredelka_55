services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-peredelka55_db}
      POSTGRES_USER: ${POSTGRES_USER:-peredelka55_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peredelka55_password}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -h localhost']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  web:
    build: .
    command: ['python', 'manage.py', 'runserver', '0.0.0.0:8000']
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-peredelka55_user}:${POSTGRES_PASSWORD:-peredelka55_password}@db:5432/${POSTGRES_DB:-peredelka55_db}
      REDIS_URL: redis://redis:6379/1
      DJANGO_USE_FILE_LOG: 'false'
      DJANGO_DEBUG: 'True'
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  media_volume:
